<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<title>Stock System</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">

<div class="bg-slate-800 p-8 rounded-xl w-full max-w-xl">

<h1 class="text-2xl font-bold mb-6 text-center">📈 מערכת מניות</h1>

<input id="tickers" placeholder="AAPL, TSLA" class="w-full p-2 mb-3 text-black rounded">
<input id="startDate" type="date" class="w-full p-2 mb-3 text-black rounded">
<input id="endDate" type="date" class="w-full p-2 mb-3 text-black rounded">

<select id="frequency" class="w-full p-2 mb-4 text-black rounded">
<option value="daily">Daily</option>
<option value="weekly">Weekly</option>
<option value="monthly">Monthly</option>
</select>

<button id="loadBtn" class="w-full bg-blue-600 p-3 rounded font-bold">
שלח בקשה
</button>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwnszvw2cot0sAHBXDZDOOvwZFnU5r0XyRE8784HxF_/exec";

document.getElementById("loadBtn").addEventListener("click", async () => {

const btn = document.getElementById("loadBtn");
btn.innerText = "טוען...";
btn.disabled = true;

const payload = {
tickers: document.getElementById("tickers").value
.split(',')
.map(t => t.trim().toUpperCase()),

startDate: document.getElementById("startDate").value,
endDate: document.getElementById("endDate").value,
frequency: document.getElementById("frequency").value
};

try {

await fetch(API_URL, {
method: "POST",
mode: "no-cors",
body: JSON.stringify(payload)
});

alert("✔ הבקשה נשלחה בהצלחה!\nבדוק את Google Sheets");

} catch (err) {

alert("❌ שגיאה: " + err.message);

}

btn.innerText = "שלח בקשה";
btn.disabled = false;

});

</script>

</body>
</html>
