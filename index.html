<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משיכת נתוני מניות | דוח פיננסי</title>
    <!-- טעינת Tailwind CSS דרך CDN (מותאם לפרויקטים סטטיים ב-GitHub Pages) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // הגדרת צבעים מותאמים אישית בסגנון פיננסי
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        finance: {
                            bg: '#0b1120',      // רקע כהה עמוק
                            card: '#151e32',    // כרטיס אפור-כחלחל
                            border: '#1e293b',  // גבול עדין
                            primary: '#2563eb', // כחול פיננסי ראשי
                            primaryHover: '#1d4ed8',
                            text: '#f1f5f9',    // טקסט ראשי
                            muted: '#94a3b8'    // טקסט משני
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* אנימציית כניסה עדינה לרכיבים */
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* עיצוב סליידר תאריכים מותאם לרקע כהה */
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8); cursor: pointer; }
    </style>
</head>
<body class="bg-finance-bg min-h-screen flex items-center justify-center p-4 font-sans text-finance-text">

    <!-- כרטיס מרכזי -->
    <main class="bg-finance-card w-full max-w-md rounded-2xl shadow-2xl border border-finance-border p-6 md:p-8 fade-in">
        <header class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent pb-1">
                משיכת נתוני מניות
            </h1>
            <p class="text-finance-muted text-sm mt-2">הזן סימולים, הגדר טווח זמן ותדירות לקבלת דוח מעודכן</p>
        </header>

        <!-- טופס קלט -->
        <form id="stockForm" class="space-y-5">
            <!-- סימולי מניות -->
            <div>
                <label for="symbols" class="block text-sm font-medium text-finance-muted mb-1">סימולי מניות (מופרדים בפסיק)</label>
                <input type="text" id="symbols" placeholder="TSLA, AAPL, AMZN, NVDA" required
                       class="w-full px-4 py-3 bg-finance-bg border border-slate-700 rounded-xl text-white placeholder-slate-600 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition duration-200">
            </div>

            <!-- טווח תאריכים -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="startDate" class="block text-sm font-medium text-finance-muted mb-1">תאריך התחלה</label>
                    <input type="date" id="startDate" required
                           class="w-full px-4 py-3 bg-finance-bg border border-slate-700 rounded-xl text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition duration-200">
                </div>
                <div>
                    <label for="endDate" class="block text-sm font-medium text-finance-muted mb-1">תאריך סיום</label>
                    <input type="date" id="endDate" required
                           class="w-full px-4 py-3 bg-finance-bg border border-slate-700 rounded-xl text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition duration-200">
                </div>
            </div>

            <!-- תדירות -->
            <div>
                <label for="frequency" class="block text-sm font-medium text-finance-muted mb-1">תדירות נתונים</label>
                <select id="frequency" required
                        class="w-full px-4 py-3 bg-finance-bg border border-slate-700 rounded-xl text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition duration-200">
                    <option value="daily">Daily (יומי)</option>
                    <option value="weekly">Weekly (שבועי)</option>
                    <option value="monthly">Monthly (חודשי)</option>
                </select>
            </div>

            <!-- כפתור שליחה -->
            <button type="submit" id="submitBtn"
                    class="w-full py-3.5 bg-finance-primary hover:bg-finance-primaryHover text-white font-semibold rounded-xl shadow-lg hover:shadow-blue-500/30 transition-all duration-200 disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2">
                שלח ובקש נתונים
            </button>
        </form>

        <!-- אזור הצלחה -->
        <div id="successArea" class="hidden mt-6 fade-in text-center">
            <div class="p-4 bg-green-900/30 border border-green-700/50 rounded-xl mb-4">
                <p class="text-green-400 font-medium text-sm">✅ הבקשה עובדה בהצלחה</p>
            </div>
            <button id="openSheetBtn"
                    class="w-full py-4 bg-green-600 hover:bg-green-500 text-white text-lg font-bold rounded-xl transition shadow-lg hover:shadow-green-500/30 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path d="M11 3a1 1 0 100 2h2.586l-6.293 6.293a1 1 0 101.414 1.414L15 6.414V9a1 1 0 102 0V4a1 1 0 00-1-1h-5z" />
                    <path d="M5 5a2 2 0 00-2 2v8a2 2 0 002 2h8a2 2 0 002-2v-3a1 1 0 10-2 0v3H5V7h3a1 1 0 000-2H5z" />
                </svg>
                פתח גיליון נתונים
            </button>
        </div>

        <!-- אזור שגיאה -->
        <div id="errorArea" class="hidden mt-6 fade-in text-center p-4 bg-red-900/30 border border-red-700/50 rounded-xl text-red-300 text-sm"></div>
    </main>

    <script>
        // 🔹 הגדרת כתובת היעד - יש להחליף לכתובת ה-Web App האמיתית שלך
        const API_URL = 'YOUR_WEB_APP_URL';

        // ⏳ קבועים לרכיבי ה-DOM
        const form = document.getElementById('stockForm');
        const submitBtn = document.getElementById('submitBtn');
        const successArea = document.getElementById('successArea');
        const openSheetBtn = document.getElementById('openSheetBtn');
        const errorArea = document.getElementById('errorArea');

        // 📅 הגדרת טווח תאריכים דיפולטיבי (30 ימים אחורה עד היום)
        const today = new Date();
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(today.getDate() - 30);
        
        document.getElementById('startDate').value = thirtyDaysAgo.toISOString().split('T')[0];
        document.getElementById('endDate').value = today.toISOString().split('T')[0];

        // 🚀 האזנה לאירוע שליחת טופס
        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // מניעת רענון דף ברירת המחדל

            // נקה הודעות קודמות
            errorArea.classList.add('hidden');
            successArea.classList.add('hidden');

            // אסוף נתונים מהטופס
            const payload = {
                symbols: document.getElementById('symbols').value.trim(),
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            // ⚙️ עדכון כפתור למצב טעינה
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                טוען נתונים...
            `;

            try {
                // 🌐 שליחה ב-POST עם כותרת ייעודית למניעת שגיאות CORS Preflight
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8' // מוגדר לפי בקשתך
                    },
                    body: JSON.stringify(payload)
                });

                // בדיקת תקינות תגובת השרת
                if (!response.ok) {
                    throw new Error(`שגיאת שרת: ${response.status} ${response.statusText}`);
                }

                // ניתוח תגובת ה-JSON מהשרת
                const data = await response.json();

                if (data.sheetUrl) {
                    // 📄 הצלחה: עדכון כפתור הפתיחה עם הלינק שחזר
                    openSheetBtn.onclick = () => window.open(data.sheetUrl, '_blank');
                    successArea.classList.remove('hidden');
                } else {
                    throw new Error('לא התקבל קישור גיליון (sheetUrl) בתגובת השרת');
                }
            } catch (error) {
                // ❌ טיפול בשגיאות
                console.error('שגיאה בתהליך:', error);
                errorArea.textContent = `❌ ${error.message || 'אירעה שגיאה לא צפויה בשליחת הנתונים'}`;
                errorArea.classList.remove('hidden');
            } finally {
                // 🔄 שחזור כפתור למצב רגיל
                submitBtn.disabled = false;
                submitBtn.textContent = 'שלח ובקש נתונים';
            }
        });
    </script>
</body>
</html>
