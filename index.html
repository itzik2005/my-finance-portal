<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משיכת נתוני מניות | דוח פיננסי</title>
    
    <!-- טעינת Tailwind עם fallback אם נכשל -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // בדיקה אם Tailwind נטען בהצלחה
        window.tailwind || document.write('<style>body{font-family:system-ui,sans-serif;background:#0b1120;color:#f1f5f9}</style>');
        
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        finance: {
                            bg: '#0b1120',
                            card: '#151e32',
                            border: '#1e293b',
                            primary: '#2563eb',
                            primaryHover: '#1d4ed8',
                            text: '#f1f5f9',
                            muted: '#94a3b8'
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        .fade-in { animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8); cursor: pointer; }
        /* סגנון בסיסי למקרה ש-Tailwind נכשל */
        .no-tw { background: #0b1120; color: #f1f5f9; font-family: system-ui, sans-serif; }
        .no-tw-card { background: #151e32; padding: 24px; border-radius: 16px; max-width: 500px; margin: 20px auto; }
    </style>
</head>
<body class="bg-finance-bg no-tw min-h-screen flex items-center justify-center p-4">

    <!-- הודעת שגיאה גלובלית (מוסתרת כברירת מחדל) -->
    <div id="globalError" class="hidden fixed top-4 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-xl shadow-xl z-50 text-center max-w-md"></div>

    <main class="bg-finance-card no-tw-card w-full max-w-md rounded-2xl shadow-2xl border border-finance-border p-6 md:p-8 fade-in">
        <header class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent pb-1">
                משיכת נתוני מניות
            </h1>
            <p class="text-finance-muted text-sm mt-2">הזן סימולים, הגדר טווח זמן ותדירות</p>
        </header>

        <form id="stockForm" class="space-y-5">
            <div>
                <label for="symbols" class="block text-sm font-medium text-finance-muted mb-1">סימולי מניות (מופרדים בפסיק)</label>
                <input type="text" id="symbols" placeholder="TSLA, AAPL, AMZN" required
                       class="w-full px-4 py-3 bg-finance-bg border border-slate-700 rounded-xl text-white placeholder-slate-600 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="startDate" class="block text-sm font-medium text-finance-muted mb-1">תאריך התחלה</label>
                    <input type="date" id="startDate" required class="w-full px-4 py-3 bg-finance-bg border border-slate-700 rounded-xl text-white focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label for="endDate" class="block text-sm font-medium text-finance-muted mb-1">תאריך סיום</label>
                    <input type="date" id="endDate" required class="w-full px-4 py-3 bg-finance-bg border border-slate-700 rounded-xl text-white focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div>
                <label for="frequency" class="block text-sm font-medium text-finance-muted mb-1">תדירות</label>
                <select id="frequency" required class="w-full px-4 py-3 bg-finance-bg border border-slate-700 rounded-xl text-white focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="daily">Daily</option>
                    <option value="weekly">Weekly</option>
                    <option value="monthly">Monthly</option>
                </select>
            </div>

            <button type="submit" id="submitBtn"
                    class="w-full py-3.5 bg-finance-primary hover:bg-finance-primaryHover text-white font-semibold rounded-xl transition disabled:opacity-60">
                שלח ובקש נתונים
            </button>
        </form>

        <div id="successArea" class="hidden mt-6 fade-in text-center">
            <div class="p-4 bg-green-900/30 border border-green-700/50 rounded-xl mb-4">
                <p class="text-green-400 font-medium">✅ הבקשה עובדה בהצלחה</p>
            </div>
            <button id="openSheetBtn"
                    class="w-full py-4 bg-green-600 hover:bg-green-500 text-white font-bold rounded-xl transition">
                📄 פתח גיליון נתונים
            </button>
        </div>

        <div id="errorArea" class="hidden mt-6 fade-in text-center p-4 bg-red-900/30 border border-red-700/50 rounded-xl text-red-300 text-sm"></div>
        
        <!-- אזור דיבאג (מוסתר, נפתח רק אם צריך) -->
        <details class="mt-6 text-xs text-finance-muted">
            <summary class="cursor-pointer hover:text-blue-400">🔧 פרטי דיבאג (לחץ לפתיחה)</summary>
            <pre id="debugInfo" class="mt-2 p-3 bg-black/30 rounded overflow-x-auto text-[11px]"></pre>
        </details>
    </main>

    <script>
        // 🔹 כתובת ה-Web App שלך
        const API_URL = 'https://script.google.com/macros/s/AKfycbwnszvw2cot0sAHBXDZDOOvwZFnU5r0XyRE8784HxF_/dev';
        
        const form = document.getElementById('stockForm');
        const submitBtn = document.getElementById('submitBtn');
        const successArea = document.getElementById('successArea');
        const openSheetBtn = document.getElementById('openSheetBtn');
        const errorArea = document.getElementById('errorArea');
        const globalError = document.getElementById('globalError');
        const debugInfo = document.getElementById('debugInfo');

        // 📅 הגדרת תאריכים דיפולטיביים
        const today = new Date().toISOString().split('T')[0];
        const thirtyDaysAgo = new Date(Date.now() - 30*24*60*60*1000).toISOString().split('T')[0];
        document.getElementById('startDate').value = thirtyDaysAgo;
        document.getElementById('endDate').value = today;

        // פונקציית עזר להצגת שגיאות
        function showError(msg, isGlobal = false) {
            console.error('❌ ERROR:', msg);
            const target = isGlobal ? globalError : errorArea;
            target.textContent = msg;
            target.classList.remove('hidden');
            debugInfo.textContent = `Time: ${new Date().toLocaleTimeString('he-IL')}\nURL: ${API_URL}\nError: ${msg}`;
            if (isGlobal) setTimeout(() => globalError.classList.add('hidden'), 5000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorArea.classList.add('hidden');
            successArea.classList.add('hidden');

            const payload = {
                symbols: document.getElementById('symbols').value.trim(),
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            // ⚙️ מצב טעינה
            submitBtn.disabled = true;
            const originalBtnText = submitBtn.textContent;
            submitBtn.textContent = '⏳ מעבד...';

            try {
                console.log('📤 Sending:', payload);
                debugInfo.textContent = `Sending to: ${API_URL}\nPayload: ${JSON.stringify(payload, null, 2)}`;

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                console.log('📥 Response status:', response.status);
                debugInfo.textContent += `\n\nResponse status: ${response.status}\nResponse OK: ${response.ok}`;

                if (!response.ok) {
                    const errorText = await response.text().catch(() => 'לא ניתן לקרוא תגובה');
                    throw new Error(`שגיאת שרת ${response.status}: ${errorText.slice(0, 200)}`);
                }

                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    const raw = await response.text();
                    console.warn('⚠️ תגובה לא בפורמט JSON:', raw.slice(0, 300));
                    throw new Error(`השרת לא החזיר JSON. סוג תוכן: ${contentType || 'לא ידוע'}`);
                }

                const data = await response.json();
                console.log('✅ Data received:', data);
                debugInfo.textContent += `\n\nResponse JSON: ${JSON.stringify(data, null, 2)}`;

                if (data.sheetUrl) {
                    openSheetBtn.onclick = () => {
                        console.log('🔗 Opening:', data.sheetUrl);
                        window.open(data.sheetUrl, '_blank');
                    };
                    successArea.classList.remove('hidden');
                } else {
                    throw new Error('לא התקבל שדה sheetUrl בתגובה. בדוק את אזור הדיבאג למטה.');
                }

            } catch (err) {
                showError(err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = originalBtnText;
            }
        });

        // 🛡 בדיקת תקינות בסיסית בעת טעינת הדף
        window.addEventListener('load', () => {
            if (!API_URL || API_URL.includes('YOUR_WEB_APP_URL')) {
                showError('⚠️ כתובת ה-Web App לא הוגדרה! ערוך את הקוד והחלף את API_URL', true);
            }
            // בדיקה אם הדף נטען דרך file:// (יכול לגרום לבעיות עם fetch)
            if (window.location.protocol === 'file:') {
                console.warn('⚠️ הדף נפתח דרך file:// - חלק מהבקשות עשויות להיחסם על ידי הדפדפן. מומלץ להשתמש בשרת מקומי או GitHub Pages.');
            }
        });
    </script>
</body>
</html>
