<script>
document.getElementById("stockForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const btn = document.getElementById("submitBtn");
  btn.innerText = "טוען...";
  btn.disabled = true;

  const payload = {
    tickers: document.getElementById("tickers").value.split(",").map(t => t.trim()),
    startDate: document.getElementById("startDate").value,
    endDate: document.getElementById("endDate").value,
    frequency: document.getElementById("frequency").value
  };

  try {

    // ✅ שולח בלבד (בלי לחכות ל־CORS response)
    fetch("https://script.google.com/macros/s/AKfycbwnszvw2cot0sAHBXDZDOOvwZFnU5r0XyRE8784HxF_/exec", {
      method: "POST",
      mode: "no-cors",
      body: JSON.stringify(payload)
    });

    // 🔥 הודעת הצלחה "אופטימית"
    alert("הבקשה נשלחה! בדוק את Google Sheet שנוצר.");

  } catch (err) {
    alert("שגיאת שליחה: " + err.message);
  }

  btn.innerText = "שלח בקשה";
  btn.disabled = false;
});
</script>
