<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Stock Data Fetcher</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(to bottom right, #0f172a, #1e293b);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center text-white">

  <div class="bg-slate-800 p-8 rounded-2xl shadow-xl w-full max-w-xl">

    <h1 class="text-2xl font-bold mb-6 text-center">
      📈 משיכת נתוני מניות
    </h1>

    <form id="stockForm" class="space-y-4">

      <div>
        <label class="block mb-1">סימולי מניות</label>
        <input 
          type="text" 
          id="tickers"
          placeholder="TSLA, AAPL, AMZN"
          class="w-full p-2 rounded-lg text-black"
          required
        />
      </div>

      <div>
        <label class="block mb-1">תאריך התחלה</label>
        <input type="date" id="startDate" class="w-full p-2 rounded-lg text-black" required />
      </div>

      <div>
        <label class="block mb-1">תאריך סיום</label>
        <input type="date" id="endDate" class="w-full p-2 rounded-lg text-black" required />
      </div>

      <div>
        <label class="block mb-1">תדירות</label>
        <select id="frequency" class="w-full p-2 rounded-lg text-black">
          <option value="Daily">Daily</option>
          <option value="Weekly">Weekly</option>
          <option value="Monthly">Monthly</option>
        </select>
      </div>

      <button 
        type="submit"
        id="submitBtn"
        class="w-full bg-blue-600 hover:bg-blue-700 transition p-3 rounded-xl font-bold"
      >
        שלח בקשה
      </button>

    </form>

    <div id="result" class="mt-6 text-center hidden">
      <a 
        id="sheetLink"
        target="_blank"
        class="inline-block bg-green-500 hover:bg-green-600 transition px-6 py-3 rounded-xl font-bold"
      >
        פתח את הגיליון 📊
      </a>
    </div>

  </div>

<script>
document.getElementById("stockForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const btn = document.getElementById("submitBtn");
  btn.innerText = "טוען נתונים...";
  btn.disabled = true;

  const tickers = document.getElementById("tickers").value
    .split(",")
    .map(t => t.trim().toUpperCase());

  const startDate = document.getElementById("startDate").value;
  const endDate = document.getElementById("endDate").value;
  const frequency = document.getElementById("frequency").value;

  const payload = { tickers, startDate, endDate, frequency };

  try {

    // ✅ FIXED: מרכאות + /exec + fetch תקין
    const response = await fetch(
      "https://script.google.com/macros/s/AKfycbwnszvw2cot0sAHBXDZDOOvwZFnU5r0XyRE8784HxF_/exec",
      {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(payload),
        redirect: "follow"
      }
    );

    const data = await response.json();

    if (data.status === "success") {
      const link = document.getElementById("sheetLink");
      link.href = data.sheetUrl;

      document.getElementById("result").classList.remove("hidden");
    } else {
      alert("שגיאה: " + data.message);
    }

  } catch (err) {
    alert("שגיאת רשת: " + err.message);
  }

  btn.innerText = "שלח בקשה";
  btn.disabled = false;
});
</script>

</body>
</html>
