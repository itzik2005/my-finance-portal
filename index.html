<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>משיכת נתוני מניות | דוח פיננסי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        finance: {
                            bg: '#0b1120',
                            card: '#151e32',
                            border: '#1e293b',
                            primary: '#2563eb',
                            primaryHover: '#1d4ed8',
                            success: '#10b981',
                            successHover: '#059669',
                            text: '#f1f5f9',
                            muted: '#94a3b8'
                        }
                    },
                    fontFamily: {
                        sans: ['Heebo', 'Segoe UI', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.8); cursor: pointer; }
        .smooth-transition { transition: all 0.2s ease-in-out; }
    </style>
</head>
<body class="bg-finance-bg min-h-screen flex items-center justify-center p-4 font-sans text-finance-text">

    <main class="bg-finance-card w-full max-w-lg rounded-2xl shadow-2xl border border-finance-border p-6 md:p-8 fade-in">
        <header class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500/20 to-cyan-400/20 mb-4 border border-blue-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" />
                </svg>
            </div>
            <h1 class="text-2xl md:text-3xl font-bold bg-gradient-to-r from-blue-400 to-cyan-300 bg-clip-text text-transparent pb-1">משיכת נתוני מניות</h1>
            <p class="text-finance-muted text-sm mt-2">הזן סימולים, הגדר טווח זמן ותדירות לקבלת דוח מעודכן</p>
        </header>

        <form id="stockForm" class="space-y-5">
            <div>
                <label for="symbols" class="block text-sm font-medium text-finance-muted mb-2">סימולי מניות <span class="text-finance-muted/70">(מופרדים בפסיק)</span></label>
                <input type="text" id="symbols" placeholder="TSLA, AAPL, AMZN" required class="w-full px-4 py-3 bg-finance-bg border border-slate-700 rounded-xl text-white placeholder-slate-600 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none smooth-transition" autocomplete="off">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="startDate" class="block text-sm font-medium text-finance-muted mb-2">תאריך התחלה</label>
                    <input type="date" id="startDate" required class="w-full px-4 py-3 bg-finance-bg border border-slate-700 rounded-xl text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none smooth-transition">
                </div>
                <div>
                    <label for="endDate" class="block text-sm font-medium text-finance-muted mb-2">תאריך סיום</label>
                    <input type="date" id="endDate" required class="w-full px-4 py-3 bg-finance-bg border border-slate-700 rounded-xl text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none smooth-transition">
                </div>
            </div>
            <div>
                <label for="frequency" class="block text-sm font-medium text-finance-muted mb-2">תדירות נתונים</label>
                <select id="frequency" required class="w-full px-4 py-3 bg-finance-bg border border-slate-700 rounded-xl text-white focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none smooth-transition appearance-none cursor-pointer">
                    <option value="daily">📅 Daily</option>
                    <option value="weekly">📆 Weekly</option>
                    <option value="monthly">🗓️ Monthly</option>
                </select>
            </div>
            <button type="submit" id="submitBtn" class="w-full py-4 bg-finance-primary hover:bg-finance-primaryHover text-white font-semibold rounded-xl shadow-lg hover:shadow-blue-500/30 smooth-transition disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2.5 mt-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                שלח ובקש נתונים
            </button>
        </form>

        <div id="successArea" class="hidden mt-6 fade-in">
            <div class="p-4 bg-green-900/30 border border-green-700/50 rounded-xl mb-4 text-center">
                <p class="text-green-400 font-medium flex items-center justify-center gap-2">✅ הבקשה עובדה בהצלחה!</p>
            </div>
            <button id="openSheetBtn" class="w-full py-4 bg-finance-success hover:bg-finance-successHover text-white text-lg font-bold rounded-xl smooth-transition shadow-lg hover:shadow-green-500/30 flex items-center justify-center gap-2.5">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                📄 פתח גיליון נתונים
            </button>
        </div>

        <div id="errorArea" class="hidden mt-6 fade-in text-center p-4 bg-red-900/30 border border-red-700/50 rounded-xl text-red-300 text-sm"></div>
        
        <details class="mt-6 text-xs text-finance-muted border-t border-slate-700 pt-4">
            <summary class="cursor-pointer hover:text-blue-400 smooth-transition">🔧 פרטי דיבאג (לחץ לפתיחה)</summary>
            <pre id="debugInfo" class="mt-3 p-3 bg-black/40 rounded-lg overflow-x-auto text-[11px] leading-relaxed"></pre>
        </details>
    </main>

    <footer class="fixed bottom-4 text-center text-xs text-finance-muted/60">
        <p>נתונים מסופקים באמצעות Yahoo Finance • לשימוש אישי בלבד</p>
    </footer>

    <script>
        // 🔹 כתובת ה-Web App שלך - השתמש ב-/exec לפריסה לייצור!
        // אם עדיין מפתח, ניתן להשתמש ב-/dev אך זה פחות יציב
        const API_URL = 'https://script.google.com/macros/s/AKfycbwnszvw2cot0sAHBXDZDOOvwZFnU5r0XyRE8784HxF_/exec';
        // ⚠️ אם אתה עדיין משתמש ב-/dev, שנה חזרה ל:
        // const API_URL = 'https://script.google.com/macros/s/AKfycbwnszvw2cot0sAHBXDZDOOvwZFnU5r0XyRE8784HxF_/dev';

        const form = document.getElementById('stockForm');
        const submitBtn = document.getElementById('submitBtn');
        const successArea = document.getElementById('successArea');
        const openSheetBtn = document.getElementById('openSheetBtn');
        const errorArea = document.getElementById('errorArea');
        const debugInfo = document.getElementById('debugInfo');

        // הגדרת תאריכים דיפולטיביים
        const today = new Date().toISOString().split('T')[0];
        const thirtyDaysAgo = new Date(Date.now() - 30*24*60*60*1000).toISOString().split('T')[0];
        document.getElementById('startDate').value = thirtyDaysAgo;
        document.getElementById('endDate').value = today;

        function showError(msg) {
            console.error('❌ ERROR:', msg);
            errorArea.textContent = `⚠️ ${msg}`;
            errorArea.classList.remove('hidden');
            debugInfo.textContent = `🕐 ${new Date().toLocaleTimeString('he-IL')}\n🔗 URL: ${API_URL}\n❌ Error: ${msg}`;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorArea.classList.add('hidden');
            successArea.classList.add('hidden');

            const payload = {
                symbols: document.getElementById('symbols').value.trim(),
                startDate: document.getElementById('startDate').value,
                endDate: document.getElementById('endDate').value,
                frequency: document.getElementById('frequency').value
            };

            submitBtn.disabled = true;
            const originalBtnContent = submitBtn.innerHTML;
            submitBtn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> מעבד...`;

            try {
                console.log('📤 Sending:', payload);
                debugInfo.textContent = `🚀 Request\n🔗 ${API_URL}\n📦 ${JSON.stringify(payload, null, 2)}`;

                // 🌐 שליחת הבקשה עם הגדרות מותאמות ל-CORS
                const response = await fetch(API_URL, {
                    method: 'POST',
                    // חשוב: text/plain מונע Preflight OPTIONS
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload),
                    // לא להגדיר mode: 'cors' במפורש - זה ברירת המחדל
                    // לא להגדיר mode: 'no-cors' כי אז לא נוכל לקרוא את התגובה
                });

                console.log('📥 Status:', response.status);
                debugInfo.textContent += `\n\n📡 Status: ${response.status}\n✅ OK: ${response.ok}`;

                if (!response.ok) {
                    const errorText = await response.text().catch(() => 'לא ניתן לקרוא תגובה');
                    throw new Error(`שגיאת שרת ${response.status}: ${errorText.slice(0, 200)}`);
                }

                // בדיקת סוג התוכן
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    const raw = await response.text();
                    console.warn('⚠️ לא JSON:', raw.slice(0, 200));
                    throw new Error(`השרת לא החזיר JSON. Content-Type: ${contentType || 'לא ידוע'}`);
                }

                const data = await response.json();
                console.log('✅ Data:', data);
                debugInfo.textContent += `\n\n📋 Response: ${JSON.stringify(data, null, 2)}`;

                if (data.sheetUrl) {
                    openSheetBtn.onclick = () => window.open(data.sheetUrl, '_blank', 'noopener,noreferrer');
                    successArea.classList.remove('hidden');
                } else if (data.success === false) {
                    throw new Error(data.error || 'שגיאה מהשרת ללא פרטים');
                } else {
                    throw new Error('לא התקבל sheetUrl בתגובה. בדוק את הלוג למטה.');
                }

            } catch (error) {
                console.error('💥 Fetch error:', error);
                
                // טיפול מיוחד לשגיאות CORS נפוצות
                if (error.message.includes('Failed to fetch') || error.name === 'TypeError') {
                    showError('❌ שגיאת חיבור לשרת. אנא בדוק:\n1. שה-Web App מוגדר עם גישה "כל אחד"\n2. שאתה משתמש בכתובת /exec (לא /dev)\n3. שהסקריפט נפרס מחדש לאחר העדכון');
                } else {
                    showError(error.message || 'אירעה שגיאה לא צפויה');
                }
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnContent;
            }
        });

        // בדיקות בעת טעינה
        window.addEventListener('load', () => {
            if (window.location.protocol === 'file:') {
                console.warn('⚠️ נפתח דרך file:// - fetch עשוי להיחסם. השתמש בשרת מקומי או GitHub Pages.');
            }
            // בדיקת תקינות בסיסית של הכתובת
            if (!API_URL || !API_URL.includes('script.google.com')) {
                console.error('❌ כתובת API לא תקינה!');
            }
        });
    </script>
</body>
</html>
